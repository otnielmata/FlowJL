openapi: 3.0.3
info:
  title: Flow JL API
  version: 0.1.0
  description: Estrutura inicial da API Rest do Flow JL com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: AI Brand Materials
  - name: AI Historical Contents
  - name: AI Schedules
  - name: Assets
  - name: Audit
  - name: Auth
  - name: Class Schedules
  - name: Dashboards
  - name: Editorial Calendar
  - name: Content Approvals
  - name: Content Statuses
  - name: Copywritings
  - name: External Publication
  - name: Discord Operations
  - name: Publications
  - name: Production Checklists
  - name: YouTube Contents
  - name: Launches
  - name: Live Events
  - name: Operational Checklists
  - name: Operational Emails
  - name: Profiles
  - name: Users
  - name: Roles
  - name: Students
  - name: Support Tickets
  - name: Traffic Audiences
  - name: Traffic Campaigns
  - name: Traffic Conversion Events
  - name: Traffic Creatives
  - name: Traffic Pixels
  - name: Traffic Reports
  - name: Traffic ROI
paths:
  /health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        '200':
          description: API disponivel
  /api/v1/ai-brand-materials:
    post:
      tags: [AI Brand Materials]
      summary: Persiste material gerado por IA para edicao humana
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiBrandMaterialRequest'
      responses:
        '201':
          description: Material salvo como versao revisavel
        '400':
          description: Dados invalidos ou contexto divergente
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
    get:
      tags: [AI Brand Materials]
      summary: Lista materiais gerados por IA
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: launchId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: materialType
          required: false
          schema:
            type: string
            enum: [SCRIPT, COPY, EMAIL]
        - in: query
          name: reviewStatus
          required: false
          schema:
            type: string
            enum: [PENDING_REVIEW, APPROVED, REJECTED]
        - in: query
          name: active
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Materiais retornados sem prompts ou fontes sensiveis
        '400':
          description: Filtros invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
  /api/v1/ai-brand-materials/{materialId}:
    get:
      tags: [AI Brand Materials]
      summary: Consulta material gerado por IA
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: materialId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Material consultado com contexto seguro e status de revisao
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Material nao encontrado
  /api/v1/ai-historical-contents:
    post:
      tags: [AI Historical Contents]
      summary: Cadastra conteudo historico classificado por desempenho
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiHistoricalContentRequest'
      responses:
        '201':
          description: Conteudo historico cadastrado sem expor notas sensiveis
        '400':
          description: Dados obrigatorios ausentes ou invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado ao acervo estrategico
        '404':
          description: Lancamento nao encontrado
    get:
      tags: [AI Historical Contents]
      summary: Consulta conteudos historicos relevantes por objetivo, formato ou lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: launchId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [REEL, CAROUSEL, STORY_SEQUENCE, EMAIL, YOUTUBE, AD, LANDING_PAGE, SCRIPT, COPY]
        - in: query
          name: objective
          required: false
          schema:
            type: string
        - in: query
          name: origin
          required: false
          schema:
            type: string
            enum: [ORIGINAL, REUSED]
        - in: query
          name: tags
          required: false
          schema:
            type: string
            description: Tags separadas por virgula
        - in: query
          name: active
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Conteudos retornados por relevancia sem dados sensiveis
        '400':
          description: Filtros invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado ao acervo estrategico
  /api/v1/ai-historical-contents/recommendations:
    post:
      tags: [AI Historical Contents]
      summary: Sugere reaproveitamento de conteudos historicos para novo contexto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiHistoricalRecommendationRequest'
      responses:
        '200':
          description: Recomendacoes correlatas retornadas com tipo de reaproveitamento
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado ao acervo estrategico
        '404':
          description: Lancamento nao encontrado
  /api/v1/ai-historical-contents/{contentId}:
    get:
      tags: [AI Historical Contents]
      summary: Consulta um conteudo historico do acervo estrategico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conteudo retornado sem notas sensiveis
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado ao acervo estrategico
        '404':
          description: Conteudo historico nao encontrado
    delete:
      tags: [AI Historical Contents]
      summary: Inativa logicamente um conteudo historico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conteudo inativado com historico preservado
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Conteudo historico nao encontrado
        '409':
          description: Conteudo historico ja inativo
  /api/v1/ai-schedules:
    post:
      tags: [AI Schedules]
      summary: Persiste um cronograma gerado por IA para revisao
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiScheduleRequest'
      responses:
        '201':
          description: Cronograma salvo para edicao e aprovacao posterior
        '400':
          description: Dados invalidos ou contexto divergente
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
    get:
      tags: [AI Schedules]
      summary: Lista cronogramas gerados por IA
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: launchId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: reviewStatus
          required: false
          schema:
            type: string
            enum: [PENDING_REVIEW, APPROVED, REJECTED]
        - in: query
          name: active
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Cronogramas retornados sem prompts ou fontes internas sensiveis
        '400':
          description: Filtros invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
  /api/v1/ai-schedules/{scheduleId}:
    get:
      tags: [AI Schedules]
      summary: Consulta um cronograma gerado por IA
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: scheduleId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cronograma consultado com metadados seguros e revisao humana pendente
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cronograma nao encontrado
  /api/v1:
    get:
      tags: [Health]
      summary: Lista os modulos iniciais da API
      responses:
        '200':
          description: Modulos disponiveis
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Autentica um usuario e retorna os tokens da sessao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Usuario autenticado
        '401':
          description: Credenciais invalidas
        '403':
          description: Acesso nao permitido
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Renova os tokens de uma sessao ativa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Sessao renovada
        '401':
          description: Refresh token invalido ou expirado
        '403':
          description: Acesso nao permitido
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Encerra uma sessao autenticada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Sessao encerrada
        '401':
          description: Refresh token invalido ou expirado
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Retorna os dados do usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario autenticado consultado
        '401':
          description: Access token invalido ou ausente
  /api/v1/audits:
    get:
      tags: [Audit]
      summary: Consulta a trilha basica de auditoria
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Eventos de auditoria consultados
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
  /api/v1/assets:
    post:
      tags: [Assets]
      summary: Cadastra um ativo reutilizavel na biblioteca
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetLibraryItemRequest'
      responses:
        '201':
          description: Ativo cadastrado com sucesso
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
    get:
      tags: [Assets]
      summary: Lista ativos por tipo, tag, lancamento ou status
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: launchId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: type
          required: false
          schema:
            type: string
        - in: query
          name: tag
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [AVAILABLE, ARCHIVED]
        - in: query
          name: active
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Itens compativeis retornados
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
  /api/v1/assets/{assetId}:
    delete:
      tags: [Assets]
      summary: Realiza a exclusao logica de um ativo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: assetId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ativo inativado com sucesso
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Ativo nao encontrado
        '409':
          description: Ativo ja esta inativo
  /api/v1/class-schedules:
    post:
      tags: [Class Schedules]
      summary: Cadastra uma aula na agenda operacional
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassScheduleRequest'
      responses:
        '201':
          description: Aula agendada com sucesso
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
    get:
      tags: [Class Schedules]
      summary: Lista aulas agendadas por contexto operacional
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: launchId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [PLANNED, CONFIRMED, COMPLETED, CANCELED, RESCHEDULED]
        - in: query
          name: responsible
          required: false
          schema:
            type: string
        - in: query
          name: startAt
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: endAt
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: active
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Aulas retornadas com horarios em UTC
        '400':
          description: Filtros invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
  /api/v1/class-schedules/{classScheduleId}:
    put:
      tags: [Class Schedules]
      summary: Atualiza data, responsavel, status ou dados de uma aula
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: classScheduleId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClassScheduleRequest'
      responses:
        '200':
          description: Aula atualizada com auditoria
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Aula nao encontrada
    delete:
      tags: [Class Schedules]
      summary: Inativa uma aula agendada preservando historico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: classScheduleId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Aula inativada por exclusao logica
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Aula nao encontrada
        '409':
          description: Aula ja inativa
  /api/v1/dashboards/strategist:
    get:
      tags: [Dashboards]
      summary: Consulta o dashboard consolidado da estrategista
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: launchId
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dashboard consolidado retornado com sucesso
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
  /api/v1/editorial-calendar:
    post:
      tags: [Editorial Calendar]
      summary: Cadastra um item no calendario editorial a partir de um conteudo base
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contentType, contentId, channel, publishAt, responsible]
              properties:
                contentType:
                  type: string
                  enum: [REEL, CAROUSEL, STORY_SEQUENCE, EMAIL_CAMPAIGN, YOUTUBE_CONTENT]
                contentId:
                  type: string
                  format: uuid
                channel:
                  type: string
                publishAt:
                  type: string
                  format: date-time
                responsible:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: Item cadastrado com sucesso
        '400':
          description: Dados invalidos ou contexto insuficiente
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Conteudo base nao encontrado
    get:
      tags: [Editorial Calendar]
      summary: Consulta o calendario editorial por periodo, canal e lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: launchId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: startAt
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: endAt
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: channel
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Calendario retornado com sucesso
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
  /api/v1/editorial-calendar/{itemId}:
    put:
      tags: [Editorial Calendar]
      summary: Ajusta data, hora, canal ou responsavel de um item do calendario
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
                publishAt:
                  type: string
                  format: date-time
                responsible:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Item atualizado com sucesso
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Item nao encontrado
  /api/v1/content-ideas:
    post:
      tags: [Content Ideas]
      summary: Cadastra uma nova ideia no banco de conteudo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentIdeaRequest'
      responses:
        '201':
          description: Ideia cadastrada com sucesso
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
    get:
      tags: [Content Ideas]
      summary: Lista ideias do banco de conteudo com filtros opcionais
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: launchId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: objective
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [BACKLOG, SELECTED, PRODUCED, DISCARDED]
        - in: query
          name: active
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Colecao filtrada de ideias
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
  /api/v1/content-ideas/{ideaId}:
    delete:
      tags: [Content Ideas]
      summary: Realiza a exclusao logica de uma ideia de conteudo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: ideaId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ideia inativada com sucesso
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Ideia nao encontrada
        '409':
          description: Ideia ja esta inativa
  /api/v1/content-approvals/{contentType}/{contentId}/status:
    post:
      tags: [Content Approvals]
      summary: Avanca ou devolve uma peca no fluxo de aprovacao
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contentType
          required: true
          schema:
            type: string
            enum: [REEL, CAROUSEL, STORY_SEQUENCE, EMAIL_CAMPAIGN, YOUTUBE_CONTENT]
        - in: path
          name: contentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeContentApprovalStatusRequest'
      responses:
        '200':
          description: Fluxo de aprovacao atualizado com sucesso
        '400':
          description: Dados invalidos ou feedback insuficiente para reprovar
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Conteudo nao encontrado
        '409':
          description: Ordem de aprovacao invalida para a peca
  /api/v1/content-statuses/{contentType}/{contentId}:
    post:
      tags: [Content Statuses]
      summary: Atualiza o status operacional de uma peca de conteudo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contentType
          required: true
          schema:
            type: string
            enum: [REEL, CAROUSEL, STORY_SEQUENCE, EMAIL_CAMPAIGN, YOUTUBE_CONTENT]
        - in: path
          name: contentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetStatus]
              properties:
                targetStatus:
                  type: string
                  description: Proximo status permitido no fluxo do tipo de conteudo.
                reason:
                  type: string
      responses:
        '200':
          description: Status atualizado e historico registrado
        '400':
          description: Dados invalidos ou status alvo nao suportado
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Conteudo nao encontrado
        '409':
          description: Transicao invalida ou checklist pendente para publicacao
  /api/v1/content-statuses/{contentType}/{contentId}/history:
    get:
      tags: [Content Statuses]
      summary: Consulta historico de mudancas de status de uma peca
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contentType
          required: true
          schema:
            type: string
            enum: [REEL, CAROUSEL, STORY_SEQUENCE, EMAIL_CAMPAIGN, YOUTUBE_CONTENT]
        - in: path
          name: contentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Historico retornado com sucesso
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Conteudo nao encontrado
  /api/v1/copywritings:
    post:
