openapi: 3.0.3
info:
  title: Flow JL API
  version: 0.1.0
  description: Estrutura inicial da API Rest do Flow JL com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Auth
  - name: Profiles
  - name: Users
  - name: Roles
paths:
  /health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        '200':
          description: API disponivel
  /api/v1:
    get:
      tags: [Health]
      summary: Lista os modulos iniciais da API
      responses:
        '200':
          description: Modulos disponiveis
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Autentica um usuario e retorna os tokens da sessao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Usuario autenticado
        '401':
          description: Credenciais invalidas
        '403':
          description: Acesso nao permitido
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Renova os tokens de uma sessao ativa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Sessao renovada
        '401':
          description: Refresh token invalido ou expirado
        '403':
          description: Acesso nao permitido
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Encerra uma sessao autenticada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Sessao encerrada
        '401':
          description: Refresh token invalido ou expirado
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Retorna os dados do usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario autenticado consultado
        '401':
          description: Access token invalido ou ausente
  /api/v1/roles:
    get:
      tags: [Roles]
      summary: Lista os cargos predefinidos do Flow JL
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cargos listados
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
    post:
      tags: [Roles]
      summary: Cadastra um cargo previsto no catalogo inicial
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Cargo criado
        '400':
          description: Codigo fora do catalogo ou dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '409':
          description: Cargo duplicado
  /api/v1/roles/{id}:
    get:
      tags: [Roles]
      summary: Consulta um cargo por identificador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cargo consultado
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cargo nao encontrado
  /api/v1/roles/{code}/permissions:
    get:
      tags: [Roles]
      summary: Consulta as permissoes de um cargo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Permissoes do cargo consultadas
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cargo nao encontrado
    put:
      tags: [Roles]
      summary: Atualiza as permissoes de um cargo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRolePermissionsRequest'
      responses:
        '200':
          description: Permissoes do cargo atualizadas
        '400':
          description: Conjunto de permissoes invalido
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cargo nao encontrado
  /api/v1/roles/{code}:
    put:
      tags: [Roles]
      summary: Atualiza os metadados de um cargo predefinido
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Cargo atualizado
        '400':
          description: Codigo fora do catalogo ou dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cargo nao encontrado
  /api/v1/users/bootstrap-admin:
    post:
      tags: [Users]
      summary: Cadastra o primeiro administrador da plataforma
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapAdminRequest'
      responses:
        '201':
          description: Primeiro administrador criado
        '400':
          description: Campos invalidos ou ausentes
        '409':
          description: Bootstrap ja concluido ou e-mail em uso
        '503':
          description: Catalogo base de acesso nao inicializado
  /api/v1/users:
    get:
      tags: [Users]
      summary: Lista colaboradores cadastrados
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Colaboradores listados
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
    post:
      tags: [Users]
      summary: Cadastra um colaborador com cargo valido
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollaboratorRequest'
      responses:
        '201':
          description: Colaborador criado
        '400':
          description: Cargo invalido ou dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '409':
          description: E-mail ja existente
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Retorna os dados do proprio usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario autenticado consultado
        '401':
          description: JWT ausente ou invalido
  /api/v1/profiles:
    get:
      tags: [Profiles]
      summary: Apresenta os perfis cadastrados
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de perfis
    post:
      tags: [Profiles]
      summary: Registra um novo perfil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '201':
          description: Perfil criado
  /api/v1/profiles/{id}:
    put:
      tags: [Profiles]
      summary: Cadastra ou edita os dados de um perfil existente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Perfil atualizado
        '404':
          description: Perfil nao encontrado
  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Consulta um colaborador por identificador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Colaborador encontrado
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Usuario nao encontrado
    put:
      tags: [Users]
      summary: Mantem os dados, cargo e status de um colaborador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Usuario atualizado
        '400':
          description: Dados invalidos, cargo invalido ou inativo, ou perfil invalido
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '409':
          description: Transicao invalida, e-mail duplicado, usuario ja ativo, auto-inativacao ou regra de negocio violada
        '404':
          description: Usuario nao encontrado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          example: Admin@123
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    CreateRoleRequest:
      type: object
      required: [code, name, description]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
    UpdateRoleRequest:
      type: object
      required: [name, description, active]
      properties:
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
    UpdateRolePermissionsRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string
    ProfileRequest:
      type: object
      required: [name, code, description]
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        active:
          type: boolean
    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        active:
          type: boolean
    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        roleId:
          type: string
          format: uuid
        profile:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, PENDING]
    BootstrapAdminRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 120
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    CreateCollaboratorRequest:
      type: object
      required: [name, email, password, roleId]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 120
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        roleId:
          type: string
          format: uuid
