openapi: 3.0.3
info:
  title: Flow JL API
  version: 0.1.0
  description: Estrutura inicial da API Rest do Flow JL com Express, JWT e MongoDB.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Audit
  - name: Auth
  - name: Launches
  - name: Profiles
  - name: Users
  - name: Roles
paths:
  /health:
    get:
      tags: [Health]
      summary: Verifica o status da API
      responses:
        '200':
          description: API disponivel
  /api/v1:
    get:
      tags: [Health]
      summary: Lista os modulos iniciais da API
      responses:
        '200':
          description: Modulos disponiveis
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Autentica um usuario e retorna os tokens da sessao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Usuario autenticado
        '401':
          description: Credenciais invalidas
        '403':
          description: Acesso nao permitido
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Renova os tokens de uma sessao ativa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Sessao renovada
        '401':
          description: Refresh token invalido ou expirado
        '403':
          description: Acesso nao permitido
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Encerra uma sessao autenticada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Sessao encerrada
        '401':
          description: Refresh token invalido ou expirado
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Retorna os dados do usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario autenticado consultado
        '401':
          description: Access token invalido ou ausente
  /api/v1/audits:
    get:
      tags: [Audit]
      summary: Consulta a trilha basica de auditoria
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Eventos de auditoria consultados
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
  /api/v1/launches:
    post:
      tags: [Launches]
      summary: Cadastra um novo lancamento
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLaunchRequest'
      responses:
        '201':
          description: Lancamento criado
        '400':
          description: Dados invalidos ou obrigatorios ausentes
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '409':
          description: Lancamento ativo duplicado para o mesmo produto e periodo
  /api/v1/launches/{launchId}:
    get:
      tags: [Launches]
      summary: Consulta um lancamento com seu historico estrategico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lancamento consultado
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
  /api/v1/launches/{launchId}/market-researches:
    post:
      tags: [Launches]
      summary: Gera uma pesquisa de mercado versionada para um lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketResearchRequest'
      responses:
        '201':
          description: Pesquisa de mercado criada
        '400':
          description: Briefing, objetivo ou contexto insuficientes
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
  /api/v1/launches/{launchId}/competitor-researches:
    post:
      tags: [Launches]
      summary: Registra evidencias de pesquisa de concorrentes para um lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompetitorResearchRequest'
      responses:
        '201':
          description: Evidencia de concorrente registrada
        '400':
          description: Concorrente, canal ou demais campos obrigatorios invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
  /api/v1/launches/{launchId}/avatars:
    post:
      tags: [Launches]
      summary: Cadastra o avatar principal do publico de um lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarRequest'
      responses:
        '201':
          description: Avatar criado
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
        '409':
          description: Ja existe um avatar atual para o lancamento
    put:
      tags: [Launches]
      summary: Atualiza o avatar atual preservando historico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarRequest'
      responses:
        '200':
          description: Avatar atualizado
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento ou avatar nao encontrado
  /api/v1/launches/{launchId}/avatar-suggestions:
    post:
      tags: [Launches]
      summary: Gera sugestoes estruturadas para complementar o avatar
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sugestoes retornadas
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
  /api/v1/launches/{launchId}/offers:
    post:
      tags: [Launches]
      summary: Cadastra a oferta vigente do lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferRequest'
      responses:
        '201':
          description: Oferta criada
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
        '409':
          description: Ja existe uma oferta vigente para o lancamento
    put:
      tags: [Launches]
      summary: Atualiza a oferta vigente preservando historico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferRequest'
      responses:
        '200':
          description: Oferta atualizada
        '400':
          description: Dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento ou oferta nao encontrado
  /api/v1/launches/{launchId}/positionings:
    post:
      tags: [Launches]
      summary: Cadastra o posicionamento vigente do lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PositioningRequest'
      responses:
        '201':
          description: Posicionamento criado
        '400':
          description: Dados invalidos ou insuficientes
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
        '409':
          description: Ja existe um posicionamento vigente para o lancamento
    put:
      tags: [Launches]
      summary: Atualiza o posicionamento vigente preservando historico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PositioningRequest'
      responses:
        '200':
          description: Posicionamento atualizado
        '400':
          description: Dados invalidos ou insuficientes
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento ou posicionamento nao encontrado
  /api/v1/launches/{launchId}/editorial-lines:
    post:
      tags: [Launches]
      summary: Cadastra a linha editorial vigente do lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditorialLineRequest'
      responses:
        '201':
          description: Linha editorial criada
        '400':
          description: Dados invalidos ou contexto estrategico insuficiente
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
        '409':
          description: Ja existe uma linha editorial vigente para o lancamento
    put:
      tags: [Launches]
      summary: Atualiza a linha editorial vigente preservando historico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditorialLineRequest'
      responses:
        '200':
          description: Linha editorial atualizada
        '400':
          description: Dados invalidos ou contexto estrategico insuficiente
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento ou linha editorial nao encontrada
  /api/v1/launches/{launchId}/content-plans:
    post:
      tags: [Launches]
      summary: Cadastra o plano de conteudo vigente do lancamento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentPlanRequest'
      responses:
        '201':
          description: Plano de conteudo criado
        '400':
          description: Dados invalidos ou ausencia de linha editorial vigente
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento nao encontrado
        '409':
          description: Ja existe um plano de conteudo vigente para o lancamento
    put:
      tags: [Launches]
      summary: Atualiza o plano de conteudo vigente preservando historico
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: launchId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentPlanRequest'
      responses:
        '200':
          description: Plano de conteudo atualizado
        '400':
          description: Dados invalidos ou ausencia de linha editorial vigente
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Lancamento ou plano de conteudo nao encontrado
  /api/v1/roles:
    get:
      tags: [Roles]
      summary: Lista os cargos ativos predefinidos do Flow JL
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cargos listados
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
    post:
      tags: [Roles]
      summary: Cadastra um cargo previsto no catalogo inicial
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Cargo criado
        '400':
          description: Codigo fora do catalogo ou dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '409':
          description: Cargo duplicado
  /api/v1/roles/{id}:
    get:
      tags: [Roles]
      summary: Consulta um cargo por identificador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cargo consultado
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cargo nao encontrado
  /api/v1/roles/{code}/permissions:
    get:
      tags: [Roles]
      summary: Consulta as permissoes de um cargo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Permissoes do cargo consultadas
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cargo nao encontrado
    put:
      tags: [Roles]
      summary: Atualiza as permissoes de um cargo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRolePermissionsRequest'
      responses:
        '200':
          description: Permissoes do cargo atualizadas
        '400':
          description: Conjunto de permissoes invalido
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cargo nao encontrado
  /api/v1/roles/{code}:
    put:
      tags: [Roles]
      summary: Atualiza os metadados de um cargo predefinido
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Cargo atualizado
        '400':
          description: Codigo fora do catalogo ou dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Cargo nao encontrado
  /api/v1/users/bootstrap-admin:
    post:
      tags: [Users]
      summary: Cadastra o primeiro administrador da plataforma
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapAdminRequest'
      responses:
        '201':
          description: Primeiro administrador criado
        '400':
          description: Campos invalidos ou ausentes
        '409':
          description: Bootstrap ja concluido ou e-mail em uso
        '503':
          description: Catalogo base de acesso nao inicializado
  /api/v1/users:
    get:
      tags: [Users]
      summary: Lista colaboradores cadastrados
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Colaboradores listados
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
    post:
      tags: [Users]
      summary: Cadastra um colaborador com cargo valido
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollaboratorRequest'
      responses:
        '201':
          description: Colaborador criado
        '400':
          description: Cargo invalido ou dados invalidos
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '409':
          description: E-mail ja existente
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Retorna os dados do proprio usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario autenticado consultado
        '401':
          description: JWT ausente ou invalido
  /api/v1/profiles:
    get:
      tags: [Profiles]
      summary: Apresenta os perfis cadastrados
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de perfis
    post:
      tags: [Profiles]
      summary: Registra um novo perfil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '201':
          description: Perfil criado
  /api/v1/profiles/{id}:
    put:
      tags: [Profiles]
      summary: Cadastra ou edita os dados de um perfil existente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Perfil atualizado
        '404':
          description: Perfil nao encontrado
  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Consulta um colaborador por identificador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Colaborador encontrado
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '404':
          description: Usuario nao encontrado
    put:
      tags: [Users]
      summary: Mantem os dados, cargo e status de um colaborador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Usuario atualizado
        '400':
          description: Dados invalidos, cargo invalido ou inativo, ou perfil invalido
        '401':
          description: JWT ausente ou invalido
        '403':
          description: Acesso negado
        '409':
          description: Transicao invalida, e-mail duplicado, usuario ja ativo, auto-inativacao ou regra de negocio violada
        '404':
          description: Usuario nao encontrado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          example: Admin@123
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    CreateLaunchRequest:
      type: object
      required: [name, expert, product, baseDate, milestones]
      properties:
        name:
          type: string
        expert:
          type: string
        product:
          type: string
        baseDate:
          type: string
          format: date-time
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/LaunchMilestoneRequest'
    LaunchMilestoneRequest:
      type: object
      required: [name, scheduledAt]
      properties:
        name:
          type: string
        scheduledAt:
          type: string
          format: date-time
    CreateMarketResearchRequest:
      type: object
      required: [briefing, objective, productContext]
      properties:
        briefing:
          type: string
          minLength: 20
        objective:
          type: string
          minLength: 8
        productContext:
          type: string
          minLength: 20
    CreateCompetitorResearchRequest:
      type: object
      required: [competitorName, channel, headline, promise, trigger, observations]
      properties:
        competitorName:
          type: string
          minLength: 3
        channel:
          type: string
          minLength: 2
        headline:
          type: string
          minLength: 3
        promise:
          type: string
          minLength: 3
        trigger:
          type: string
          minLength: 3
        observations:
          type: string
          minLength: 3
        capturedAt:
          type: string
          format: date-time
    AvatarRequest:
      type: object
      required: [profile, pains, dreams, objections, language]
      properties:
        profile:
          type: string
          minLength: 10
        pains:
          type: array
          items:
            type: string
        dreams:
          type: array
          items:
            type: string
        objections:
          type: array
          items:
            type: string
        language:
          type: array
          items:
            type: string
    OfferRequest:
      type: object
      required: [product, transformation, promise, benefits, differentials]
      properties:
        product:
          type: string
          minLength: 3
        transformation:
          type: string
          minLength: 10
        promise:
          type: string
          minLength: 10
        benefits:
          type: array
          items:
            type: string
        differentials:
          type: array
          items:
            type: string
        positioningContext:
          type: string
    PositioningRequest:
      type: object
      required: [thesis, centralPromise, differentiators, references]
      properties:
        thesis:
          type: string
          minLength: 10
        centralPromise:
          type: string
          minLength: 10
        differentiators:
          type: array
          items:
            type: string
        references:
          type: array
          items:
            type: string
    EditorialLineRequest:
      type: object
      required: [pillars]
      properties:
        pillars:
          type: array
          items:
            type: object
            required: [name, objective, priority]
            properties:
              name:
                type: string
              objective:
                type: string
              priority:
                type: integer
              active:
                type: boolean
    ContentPlanRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
