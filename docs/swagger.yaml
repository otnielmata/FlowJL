components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          example: Admin@123
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    GenerateAiBrandMaterialRequest:
      type: object
      required: [materialType, objective, briefing]
      properties:
        materialType:
          type: string
          enum: [SCRIPT, COPY, EMAIL]
        objective:
          type: string
          minLength: 8
          maxLength: 180
        briefing:
          type: string
          minLength: 30
          maxLength: 5000
    AiBrandMaterialSection:
      type: object
      required: [label, content]
      properties:
        label:
          type: string
          minLength: 3
          maxLength: 80
        content:
          type: string
          minLength: 8
          maxLength: 3000
    AiBrandMaterialSourceContext:
      type: object
      required: [launchId, launchName, product, expert, avatarVersion, editorialLineVersion, positioningVersion, offerVersion, editorialPillars, languageCues, brandSignals]
      properties:
        launchId:
          type: string
          format: uuid
        launchName:
          type: string
        product:
          type: string
        expert:
          type: string
        avatarVersion:
          type: integer
          nullable: true
        editorialLineVersion:
          type: integer
          nullable: true
        positioningVersion:
          type: integer
          nullable: true
        offerVersion:
          type: integer
          nullable: true
        editorialPillars:
          type: array
          items:
            type: string
        languageCues:
          type: array
          items:
            type: string
        brandSignals:
          type: array
          items:
            type: string
    AiBrandMaterialRequest:
      type: object
      required: [launchId, materialType, objective, briefing, title, hook, sections, cta, sourceContext]
      properties:
        launchId:
          type: string
          format: uuid
        materialType:
          type: string
          enum: [SCRIPT, COPY, EMAIL]
        objective:
          type: string
          minLength: 8
          maxLength: 180
        briefing:
          type: string
          minLength: 30
          maxLength: 5000
        title:
          type: string
          minLength: 3
          maxLength: 240
        hook:
          type: string
          minLength: 8
          maxLength: 800
        sections:
          type: array
          items:
            $ref: '#/components/schemas/AiBrandMaterialSection'
        cta:
          type: string
          minLength: 3
          maxLength: 240
        reviewNotes:
          type: array
          items:
          type: string
        sourceContext:
          $ref: '#/components/schemas/AiBrandMaterialSourceContext'
    AiHistoricalPerformance:
      type: object
      required: [score]
      properties:
        views:
          type: integer
          minimum: 0
        clicks:
          type: integer
          minimum: 0
        conversions:
          type: integer
          minimum: 0
        revenue:
          type: number
          minimum: 0
        engagementRate:
          type: number
          minimum: 0
        score:
          type: number
          minimum: 0
    AiHistoricalContentRequest:
      type: object
      required: [title, format, objective, summary, performance]
      properties:
        launchId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          minLength: 3
          maxLength: 240
        format:
          type: string
          enum: [REEL, CAROUSEL, STORY_SEQUENCE, EMAIL, YOUTUBE, AD, LANDING_PAGE, SCRIPT, COPY]
        objective:
          type: string
          minLength: 3
          maxLength: 180
        summary:
          type: string
          minLength: 8
          maxLength: 2000
        tags:
          type: array
          items:
            type: string
        origin:
          type: string
          enum: [ORIGINAL, REUSED]
        reusedFromContentId:
          type: string
          format: uuid
          nullable: true
        performance:
          $ref: '#/components/schemas/AiHistoricalPerformance'
        sensitiveNotes:
          type: string
          nullable: true
    AiHistoricalRecommendationRequest:
      type: object
      required: [launchId, objective]
      properties:
        launchId:
          type: string
          format: uuid
        objective:
          type: string
          minLength: 3
          maxLength: 180
        format:
          type: string
          enum: [REEL, CAROUSEL, STORY_SEQUENCE, EMAIL, YOUTUBE, AD, LANDING_PAGE, SCRIPT, COPY]
        tags:
          type: array
          items:
            type: string
        limit:
          type: integer
          minimum: 1
          maximum: 20
    GenerateAiScheduleRequest:
      type: object
      required: [objective, briefing]
      properties:
        objective:
          type: string
          minLength: 8
          maxLength: 180
        briefing:
          type: string
          minLength: 30
          maxLength: 5000
    AiScheduleActivity:
      type: object
      required: [title, stage, area, suggestedResponsibleRole, dueAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 3
          maxLength: 180
        stage:
          type: string
          minLength: 3
          maxLength: 120
        area:
          type: string
          minLength: 2
          maxLength: 120
        suggestedResponsibleRole:
          type: string
          minLength: 2
          maxLength: 80
        dueAt:
          type: string
          format: date-time
        dependencies:
          type: array
          items:
            type: string
        reviewNotes:
          type: array
          items:
            type: string
    AiSchedulePhase:
      type: object
      required: [name, objective, startsAt, endsAt, activities]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 120
        objective:
          type: string
          minLength: 8
          maxLength: 300
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        activities:
          type: array
          items:
            $ref: '#/components/schemas/AiScheduleActivity'
